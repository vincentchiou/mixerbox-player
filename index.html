<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MixerBox 一鍵播放器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'Segoe UI', Roboto, 'Noto Sans TC', sans-serif;
    background: linear-gradient(145deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    overflow: hidden;
    user-select: none;
  }
  .container {
    text-align: center;
    padding: 40px;
  }
  .logo {
    font-size: 48px;
    font-weight: 800;
    background: linear-gradient(135deg, #f7971e, #ffd200);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
    letter-spacing: 2px;
  }
  .subtitle {
    font-size: 16px;
    color: rgba(255,255,255,0.5);
    margin-bottom: 48px;
    letter-spacing: 4px;
  }
  .play-btn {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: linear-gradient(145deg, #f7971e, #ffd200);
    border: none;
    cursor: pointer;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 32px;
    box-shadow: 0 0 60px rgba(247,151,30,0.3), 0 0 120px rgba(247,151,30,0.1);
    transition: all 0.3s ease;
    animation: pulse 2s ease-in-out infinite;
  }
  .play-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 80px rgba(247,151,30,0.5), 0 0 160px rgba(247,151,30,0.2);
    animation: none;
  }
  .play-btn:active {
    transform: scale(0.95);
  }
  .play-btn svg {
    width: 80px;
    height: 80px;
    fill: #1a1a2e;
    margin-left: 12px;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 40px rgba(247,151,30,0.3), 0 0 80px rgba(247,151,30,0.1); }
    50% { box-shadow: 0 0 60px rgba(247,151,30,0.5), 0 0 120px rgba(247,151,30,0.2); }
  }
  .play-label {
    font-size: 20px;
    font-weight: 600;
    color: rgba(255,255,255,0.9);
    margin-bottom: 4px;
  }
  .play-desc {
    font-size: 14px;
    color: rgba(255,255,255,0.4);
  }
  .status {
    margin-top: 32px;
    font-size: 13px;
    color: rgba(255,255,255,0.3);
    transition: all 0.3s ease;
  }
  .status.loading {
    color: #ffd200;
  }
  .status.error {
    color: #ff4444;
  }
  .particle {
    position: fixed;
    width: 4px;
    height: 4px;
    background: rgba(247,151,30,0.6);
    border-radius: 50%;
    pointer-events: none;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="logo">MixerBox</div>
    <div class="subtitle">一 鍵 播 放 器</div>
    <button class="play-btn" id="playBtn" onclick="onPlay()">
      <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
    </button>
    <div class="play-label">華語本週熱門排行</div>
    <div class="play-desc">隨機播放 · 50 首歌曲</div>
    <div class="status" id="status">點擊按鈕開始播放</div>
  </div>
  <script>
    function onPlay() {
      const status = document.getElementById('status');
      status.textContent = '正在啟動播放器...';
      status.className = 'status loading';
      if (window.pywebview && window.pywebview.api) {
        window.pywebview.api.play();
      }
    }
    for (let i = 0; i < 30; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.top = Math.random() * 100 + '%';
      p.style.animation = 'pulse ' + (2 + Math.random() * 3) + 's ease-in-out infinite';
      p.style.animationDelay = Math.random() * 3 + 's';
      document.body.appendChild(p);
    }
  </script>
</body>
</html>
